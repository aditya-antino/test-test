<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Maintenance - Spare Space</title>
        <link rel="icon" href="/favicon.ico" type="image/x-icon" />
        <link

            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Poppins', sans-serif;
                background-color: #ffffff;
                color: #1a1a1a;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;

            }

            }

            .footer-text {
                margin-top: 40px;
                font-size: 0.95rem;
                color: #888;
                border-top: 1px solid #eee;

            }

            .whatsapp-link {
                color: #f6cd28;
                text-decoration: none;
                font-weight: 600;
            }

            .whatsapp-link:hover {
                text-decoration: underline;
            }

            .logo {

            }

                width: auto;
            }

        <div class="container">

            <div class="footer-text">

                <a href="https://wa.me/918076533100" class="whatsapp-link"

                >.
            </div>
        </div>

</html>
